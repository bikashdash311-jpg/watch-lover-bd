<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Lover BD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.hero{
width:100%;
height:100vh;
background:url('banner.jpg') no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.55);
padding:40px;
border-radius:12px;
color:white;
}

.overlay h1{
font-size:55px;
margin-bottom:15px;
}

.overlay p{
font-size:22px;
margin-bottom:25px;
}

.btn{
background:#d4af37;
color:black;
padding:14px 30px;
text-decoration:none;
font-weight:bold;
border-radius:6px;
display:inline-block;
}

.products{
padding:60px 20px;
text-align:center;
}

.products h2{
font-size:36px;
margin-bottom:30px;
}

.product-grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.product-card{
background:white;
padding:20px;
width:250px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

.product-card h3{
margin:15px 0 10px;
}

.product-card p{
color:#d4af37;
font-size:20px;
font-weight:bold;
}
</style>
</head>
<body>

<section class="hero">
<div class="overlay">
<h1>Watch Lover BD</h1>
<p>Original Casio Watches Collection</p>
<a href="#" class="btn">Shop Now</a>
</div>
</section>

<section class="products">
<h2>Featured Watches</h2>

<div class="product-grid">

<div class="product-card">
<img src="watch1.jpg" alt="">
<h3>Casio Edifice</h3>
<p>৳8,500</p>
</div>

<div class="product-card">
<img src="watch2.jpg" alt="">
<h3>Casio Vintage</h3>
<p>৳4,200</p>
</div>

<div class="product-card">
<img src="watch3.jpg" alt="">
<h3>Casio G-Shock</h3>
<p>৳12,000</p>
</div>

</div>
</section>

</body>
</html>
