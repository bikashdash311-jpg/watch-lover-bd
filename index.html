<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Lover BD</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    .hero{
      width:100%;
      height:100vh;
      background:url('banner.jpg') no-repeat center center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .overlay{
      background:rgba(0,0,0,0.55);
      padding:40px;
      border-radius:12px;
      color:white;
    }

    .overlay h1{
      font-size:55px;
      margin-bottom:15px;
    }

    .overlay p{
      font-size:22px;
      margin-bottom:25px;
    }

    .btn{
      background:#d4af37;
      color:black;
      padding:14px 30px;
      text-decoration:none;
      font-weight:bold;
      border-radius:6px;
    }

    .btn:hover{
      background:white;
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="overlay">
    <h1>Watch Lover BD</h1>
    <p>Original Casio Watches Collection</p>
    <a href="#" class="btn">Shop Now</a>
  </div>
</section>

</body>
</html>
